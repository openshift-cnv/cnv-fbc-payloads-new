# .github/workflows/auto-merge.yml
# @ai-rules:
# 1. [Pattern]: Triggers on workflow_run after "CI Check" completes — works for forks.
# 2. [Constraint]: Only acts on branches containing "dev-preview".
# 3. [Gotcha]: Uses --admin to bypass branch protection; requires GITHUB_TOKEN with admin scope.
# 4. [Gotcha]: Fork PR SHAs aren't in the base repo — use workflow_run.pull_requests array.
# 5. [Gotcha]: gh pr checks --watch exits 0 even on failure — poll status via API instead.
# 6. [Constraint]: concurrency group prevents duplicate merge attempts for the same PR.

name: Auto Merge

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      contains(github.event.workflow_run.head_branch, 'dev-preview')
    runs-on: ubuntu-latest
    concurrency:
      group: auto-merge-${{ github.event.workflow_run.pull_requests[0].number }}
      cancel-in-progress: true
    steps:
      - name: Find open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_FROM_EVENT: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          PR_NUMBER="$PR_FROM_EVENT"
          if [ -z "$PR_NUMBER" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
              --jq '.[0].number // empty' 2>/dev/null || true)
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found, skipping."
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER"

      - name: Poll until all checks complete
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"
          MAX_ATTEMPTS=60
          INTERVAL=30

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $i/$MAX_ATTEMPTS ==="

            PR_STATE=$(gh pr view "$PR" --repo "$REPO" --json state --jq '.state' 2>/dev/null || true)
            if [ "$PR_STATE" != "OPEN" ]; then
              echo "PR #$PR is $PR_STATE — aborting."
              exit 1
            fi

            CHECKS=$(gh pr checks "$PR" --repo "$REPO" --json name,state,conclusion 2>/dev/null || true)
            if [ -z "$CHECKS" ]; then
              echo "Could not fetch checks, retrying..."
              sleep "$INTERVAL"
              continue
            fi

            echo "$CHECKS" | jq -r '.[] | "\(.name): \(.state) / \(.conclusion)"'

            PENDING=$(echo "$CHECKS" | jq '[.[] | select(.state != "COMPLETED")] | length')
            FAILED=$(echo "$CHECKS" | jq '[.[] | select(.state == "COMPLETED" and (.conclusion | IN("SUCCESS", "NEUTRAL", "SKIPPED") | not))] | length')

            if [ "$FAILED" -gt 0 ]; then
              echo "::error::One or more checks failed or were cancelled. Aborting merge."
              echo "$CHECKS" | jq -r '.[] | select(.state == "COMPLETED" and (.conclusion | IN("SUCCESS", "NEUTRAL", "SKIPPED") | not)) | "  BLOCKED: \(.name) — \(.conclusion)"'
              exit 1
            fi

            if [ "$PENDING" -eq 0 ]; then
              echo "All checks passed."
              exit 0
            fi

            echo "$PENDING check(s) still pending, waiting ${INTERVAL}s..."
            sleep "$INTERVAL"
          done

          echo "::error::Timed out waiting for checks after $((MAX_ATTEMPTS * INTERVAL))s."
          exit 1

      - name: Merge PR
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"
          PR_STATE=$(gh pr view "$PR" --repo "$REPO" --json state --jq '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR #$PR is $PR_STATE — skipping merge."
            exit 0
          fi
          echo "All checks passed — merging PR #$PR"
          gh pr merge "$PR" --repo "$REPO" --merge --admin --delete-branch
