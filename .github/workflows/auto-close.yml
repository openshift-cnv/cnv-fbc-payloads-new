# .github/workflows/auto-close.yml
# @ai-rules:
# 1. [Pattern]: Triggers on workflow_run after "CI Check" completes — works for forks.
# 2. [Constraint]: Only acts on branches containing "dev-preview".
# 3. [Purpose]: Closes PRs whose CI check failed, keeping the repo clean.
# 4. [Pattern]: PR lookup uses branch name search — works for both forks and same-repo.

name: Auto Close

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]

permissions:
  pull-requests: write
  checks: read

jobs:
  close:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      contains(github.event.workflow_run.head_branch, 'dev-preview')
    runs-on: ubuntu-latest
    steps:
      - name: Find open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH, skipping."
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER for branch $BRANCH"

      - name: Close PR
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "CI Check failed — closing PR #${{ steps.pr.outputs.number }}"
          gh pr close ${{ steps.pr.outputs.number }} \
            --repo "${{ github.repository }}" \
            --comment "CI Check failed. Closing automatically."
