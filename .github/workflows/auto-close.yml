# .github/workflows/auto-close.yml
# @ai-rules:
# 1. [Pattern]: Triggers on workflow_run after "CI Check" completes — works for forks.
# 2. [Constraint]: Only acts on branches containing "dev-preview".
# 3. [Purpose]: Closes PRs whose CI check failed, keeping the repo clean.
# 4. [Gotcha]: Fork PR SHAs aren't in the base repo — use workflow_run.pull_requests array.

name: Auto Close

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]

permissions:
  pull-requests: write
  checks: read

jobs:
  close:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      contains(github.event.workflow_run.head_branch, 'dev-preview')
    runs-on: ubuntu-latest
    steps:
      - name: Find open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_FROM_EVENT: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          PR_NUMBER="$PR_FROM_EVENT"
          if [ -z "$PR_NUMBER" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
              --jq '.[0].number // empty' 2>/dev/null || true)
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found, skipping."
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER"

      - name: Close PR
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "CI Check failed — closing PR #${{ steps.pr.outputs.number }}"
          gh pr close ${{ steps.pr.outputs.number }} \
            --repo "${{ github.repository }}" \
            --comment "CI Check failed. Closing automatically."
